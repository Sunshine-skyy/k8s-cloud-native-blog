apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-frontend
  namespace: blog-platform
  labels:
    app: blog
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog
      tier: frontend
  template:
    metadata:
      labels:
        app: blog
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              cat > /usr/share/nginx/html/index.html << 'EOF'
              <!DOCTYPE html>
              <html lang="zh-CN">
              <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>KubeBlog 云原生博客系统</title>
                <style>
                  :root {
                    --primary: #2563eb;
                    --secondary: #06b6d4;
                    --bg: #f8fafc;
                    --bg-soft: #eef4ff;
                    --surface: rgba(255, 255, 255, 0.82);
                    --surface-strong: rgba(255, 255, 255, 0.94);
                    --surface-dark: rgba(15, 23, 42, 0.78);
                    --line: rgba(148, 163, 184, 0.22);
                    --text: #0f172a;
                    --text-soft: #475569;
                    --text-muted: #64748b;
                    --success: #22c55e;
                    --warning: #f59e0b;
                    --danger: #ef4444;
                    --info: #0ea5e9;
                    --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
                    --shadow-md: 0 12px 30px rgba(15, 23, 42, 0.08);
                    --radius-xl: 24px;
                    --radius-lg: 18px;
                    --radius-md: 14px;
                    --radius-sm: 10px;
                  }

                  * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                  }

                  html,
                  body {
                    width: 100%;
                    height: 100%;
                    overflow: hidden;
                  }

                  body {
                    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
                    color: var(--text);
                    background:
                      radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
                      radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.12), transparent 26%),
                      linear-gradient(180deg, #f8fbff 0%, #eff6ff 45%, #f8fafc 100%);
                  }

                  body::before,
                  body::after {
                    content: "";
                    position: fixed;
                    border-radius: 999px;
                    filter: blur(70px);
                    pointer-events: none;
                    z-index: 0;
                  }

                  body::before {
                    width: 260px;
                    height: 260px;
                    top: -80px;
                    left: -40px;
                    background: rgba(37, 99, 235, 0.15);
                  }

                  body::after {
                    width: 220px;
                    height: 220px;
                    right: -50px;
                    bottom: -50px;
                    background: rgba(6, 182, 212, 0.12);
                  }

                  .app-shell {
                    position: relative;
                    z-index: 1;
                    width: min(1480px, calc(100vw - 24px));
                    height: min(960px, calc(100dvh - 24px));
                    margin: 12px auto;
                    background: rgba(255, 255, 255, 0.5);
                    border: 1px solid rgba(255, 255, 255, 0.7);
                    border-radius: 28px;
                    box-shadow: var(--shadow-lg);
                    backdrop-filter: blur(18px);
                    overflow: hidden;
                    display: grid;
                    grid-template-rows: auto 1fr;
                  }

                  .topbar {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 20px;
                    padding: 16px 24px;
                    background: rgba(255, 255, 255, 0.72);
                    border-bottom: 1px solid var(--line);
                    backdrop-filter: blur(14px);
                  }

                  .brand {
                    display: flex;
                    align-items: center;
                    gap: 14px;
                    min-width: 0;
                  }

                  .brand-mark {
                    width: 42px;
                    height: 42px;
                    border-radius: 14px;
                    background: linear-gradient(135deg, var(--primary), var(--secondary));
                    color: #fff;
                    display: grid;
                    place-items: center;
                    font-weight: 800;
                    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
                    flex: none;
                  }

                  .brand-copy {
                    min-width: 0;
                  }

                  .brand-copy h1 {
                    font-size: 20px;
                    font-weight: 800;
                    letter-spacing: 0.01em;
                    white-space: nowrap;
                  }

                  .brand-copy p {
                    color: var(--text-muted);
                    font-size: 12px;
                    margin-top: 4px;
                    white-space: nowrap;
                  }

                  .nav-tabs {
                    display: flex;
                    gap: 8px;
                    background: rgba(255, 255, 255, 0.75);
                    border: 1px solid rgba(148, 163, 184, 0.18);
                    padding: 6px;
                    border-radius: 999px;
                  }

                  .nav-tab {
                    border: none;
                    background: transparent;
                    color: var(--text-soft);
                    padding: 10px 16px;
                    border-radius: 999px;
                    cursor: pointer;
                    font-weight: 700;
                    font-size: 14px;
                    transition: 0.2s ease;
                  }

                  .nav-tab.active {
                    background: linear-gradient(135deg, var(--primary), var(--secondary));
                    color: #fff;
                    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
                  }

                  .topbar-side {
                    display: flex;
                    align-items: center;
                    gap: 12px;
                  }

                  .status-pill {
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                    padding: 10px 14px;
                    border-radius: 999px;
                    background: rgba(34, 197, 94, 0.1);
                    color: #15803d;
                    font-size: 13px;
                    font-weight: 700;
                    border: 1px solid rgba(34, 197, 94, 0.18);
                  }

                  .status-dot {
                    width: 8px;
                    height: 8px;
                    border-radius: 999px;
                    background: currentColor;
                    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
                  }

                  .clock {
                    color: var(--text-muted);
                    font-size: 13px;
                    font-weight: 600;
                    min-width: 150px;
                    text-align: right;
                  }

                  .main {
                    min-height: 0;
                    overflow: hidden;
                    padding: 18px;
                  }

                  .tab-panel {
                    height: 100%;
                    display: none;
                    min-height: 0;
                  }

                  .tab-panel.active {
                    display: block;
                  }

                  .home-layout,
                  .status-layout {
                    height: 100%;
                    display: grid;
                    grid-template-rows: auto auto 1fr;
                    gap: 16px;
                    min-height: 0;
                  }

                  .manage-layout {
                    height: 100%;
                    display: grid;
                    grid-template-columns: minmax(0, 1.2fr) 380px;
                    gap: 16px;
                    min-height: 0;
                  }

                  .hero {
                    position: relative;
                    overflow: hidden;
                    border-radius: var(--radius-xl);
                    padding: 28px;
                    color: #fff;
                    background:
                      radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 22%),
                      linear-gradient(135deg, #0f172a 0%, #1d4ed8 42%, #0891b2 100%);
                    box-shadow: var(--shadow-md);
                    display: grid;
                    grid-template-columns: 1.25fr 0.95fr;
                    gap: 24px;
                  }

                  .hero::after {
                    content: "";
                    position: absolute;
                    width: 280px;
                    height: 280px;
                    right: -80px;
                    top: -80px;
                    border-radius: 999px;
                    background: rgba(255, 255, 255, 0.08);
                    filter: blur(8px);
                  }

                  .hero-copy {
                    position: relative;
                    z-index: 1;
                  }

                  .hero-badge {
                    display: inline-flex;
                    align-items: center;
                    gap: 8px;
                    padding: 8px 12px;
                    border-radius: 999px;
                    background: rgba(255, 255, 255, 0.12);
                    font-size: 12px;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    margin-bottom: 14px;
                  }

                  .hero h2 {
                    font-size: clamp(28px, 3.2vw, 40px);
                    line-height: 1.12;
                    margin-bottom: 14px;
                    font-weight: 900;
                  }

                  .hero p {
                    color: rgba(255, 255, 255, 0.86);
                    line-height: 1.8;
                    font-size: 15px;
                    max-width: 720px;
                  }

                  .hero-highlights {
                    margin-top: 22px;
                    display: flex;
                    flex-wrap: wrap;
                    gap: 10px;
                  }

                  .highlight-chip {
                    padding: 10px 14px;
                    border-radius: 999px;
                    background: rgba(255, 255, 255, 0.12);
                    border: 1px solid rgba(255, 255, 255, 0.16);
                    font-size: 13px;
                    font-weight: 700;
                  }

                  .hero-side {
                    position: relative;
                    z-index: 1;
                    display: grid;
                    gap: 12px;
                    align-content: center;
                  }

                  .hero-side-card {
                    padding: 16px 18px;
                    border-radius: 18px;
                    background: rgba(255, 255, 255, 0.1);
                    border: 1px solid rgba(255, 255, 255, 0.14);
                    backdrop-filter: blur(10px);
                  }

                  .hero-side-card span {
                    display: block;
                    color: rgba(255, 255, 255, 0.76);
                    font-size: 12px;
                    margin-bottom: 8px;
                  }

                  .hero-side-card strong {
                    display: block;
                    font-size: 18px;
                    font-weight: 800;
                  }

                  .overview-grid,
                  .status-grid {
                    display: grid;
                    grid-template-columns: repeat(4, minmax(0, 1fr));
                    gap: 14px;
                  }

                  .card {
                    background: var(--surface);
                    border: 1px solid rgba(255, 255, 255, 0.9);
                    border-radius: var(--radius-lg);
                    box-shadow: var(--shadow-md);
                    backdrop-filter: blur(14px);
                  }

                  .overview-card,
                  .status-card {
                    padding: 18px;
                  }

                  .card-label {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                    margin-bottom: 12px;
                  }

                  .card-label span {
                    color: var(--text-muted);
                    font-size: 12px;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    font-weight: 700;
                  }

                  .card-value {
                    font-size: 30px;
                    font-weight: 900;
                    color: var(--text);
                    line-height: 1;
                  }

                  .card-desc {
                    margin-top: 10px;
                    color: var(--text-soft);
                    font-size: 13px;
                    line-height: 1.7;
                  }

                  .badge {
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    padding: 6px 10px;
                    border-radius: 999px;
                    font-size: 12px;
                    font-weight: 700;
                    white-space: nowrap;
                  }

                  .badge.success {
                    color: #15803d;
                    background: rgba(34, 197, 94, 0.12);
                  }

                  .badge.warning {
                    color: #b45309;
                    background: rgba(245, 158, 11, 0.14);
                  }

                  .badge.danger {
                    color: #b91c1c;
                    background: rgba(239, 68, 68, 0.12);
                  }

                  .badge.info {
                    color: #0369a1;
                    background: rgba(14, 165, 233, 0.12);
                  }

                  .home-bottom {
                    min-height: 0;
                    display: grid;
                    grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
                    gap: 16px;
                  }

                  .panel-card {
                    min-height: 0;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                  }

                  .panel-header {
                    padding: 18px 20px 14px;
                    border-bottom: 1px solid rgba(148, 163, 184, 0.16);
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                  }

                  .panel-header h3 {
                    font-size: 18px;
                    font-weight: 800;
                  }

                  .panel-header p {
                    color: var(--text-muted);
                    font-size: 13px;
                    margin-top: 4px;
                  }

                  .panel-body {
                    min-height: 0;
                    overflow-y: auto;
                    padding: 16px 20px 20px;
                  }

                  .panel-body::-webkit-scrollbar,
                  .list-scroll::-webkit-scrollbar,
                  .editor-scroll::-webkit-scrollbar {
                    width: 10px;
                  }

                  .panel-body::-webkit-scrollbar-thumb,
                  .list-scroll::-webkit-scrollbar-thumb,
                  .editor-scroll::-webkit-scrollbar-thumb {
                    background: rgba(148, 163, 184, 0.3);
                    border-radius: 999px;
                  }

                  .quick-list {
                    display: grid;
                    gap: 12px;
                  }

                  .quick-post {
                    padding: 16px;
                    border-radius: 16px;
                    background: rgba(248, 250, 252, 0.86);
                    border: 1px solid rgba(226, 232, 240, 0.9);
                  }

                  .quick-post h4 {
                    font-size: 16px;
                    font-weight: 800;
                    margin-bottom: 8px;
                    line-height: 1.5;
                  }

                  .quick-post .meta {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 8px 12px;
                    color: var(--text-muted);
                    font-size: 12px;
                    margin-bottom: 10px;
                  }

                  .quick-post .excerpt {
                    color: var(--text-soft);
                    font-size: 14px;
                    line-height: 1.8;
                  }

                  .architecture-list {
                    display: grid;
                    gap: 12px;
                  }

                  .architecture-item {
                    padding: 16px;
                    border-radius: 16px;
                    background: linear-gradient(180deg, rgba(239, 246, 255, 0.94), rgba(248, 250, 252, 0.94));
                    border: 1px solid rgba(191, 219, 254, 0.7);
                  }

                  .architecture-item strong {
                    display: block;
                    font-size: 15px;
                    margin-bottom: 6px;
                  }

                  .architecture-item p {
                    color: var(--text-soft);
                    font-size: 13px;
                    line-height: 1.75;
                  }

                  .list-card,
                  .editor-card {
                    min-height: 0;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                  }

                  .list-card .panel-header,
                  .editor-card .panel-header {
                    padding-bottom: 16px;
                  }

                  .toolbar {
                    padding: 16px 18px;
                    border-bottom: 1px solid rgba(148, 163, 184, 0.16);
                    display: grid;
                    grid-template-columns: minmax(0, 1fr) 140px auto auto;
                    gap: 10px;
                  }

                  .search-box,
                  .select-box {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    padding: 0 14px;
                    min-height: 46px;
                    border-radius: 14px;
                    border: 1px solid rgba(148, 163, 184, 0.22);
                    background: rgba(255, 255, 255, 0.82);
                  }

                  .search-box input,
                  .select-box select,
                  .form-group input,
                  .form-group select,
                  .form-group textarea {
                    width: 100%;
                    border: none;
                    outline: none;
                    background: transparent;
                    color: var(--text);
                    font-size: 14px;
                    font-family: inherit;
                  }

                  .toolbar-tag {
                    color: var(--text-muted);
                    font-size: 12px;
                    font-weight: 700;
                    white-space: nowrap;
                  }

                  .btn,
                  .ghost-btn,
                  .danger-btn,
                  .tiny-btn,
                  .tab-action {
                    border: none;
                    border-radius: 14px;
                    cursor: pointer;
                    transition: 0.2s ease;
                    font-weight: 800;
                    font-family: inherit;
                  }

                  .btn,
                  .ghost-btn,
                  .tab-action {
                    min-height: 46px;
                    padding: 0 18px;
                  }

                  .btn {
                    color: #fff;
                    background: linear-gradient(135deg, var(--primary), var(--secondary));
                    box-shadow: 0 14px 24px rgba(37, 99, 235, 0.18);
                  }

                  .btn:hover,
                  .ghost-btn:hover,
                  .danger-btn:hover,
                  .tiny-btn:hover,
                  .tab-action:hover {
                    transform: translateY(-1px);
                  }

                  .ghost-btn {
                    color: var(--text-soft);
                    background: rgba(241, 245, 249, 0.9);
                    border: 1px solid rgba(226, 232, 240, 0.95);
                  }

                  .tab-action {
                    color: var(--primary);
                    background: rgba(37, 99, 235, 0.08);
                    border: 1px solid rgba(37, 99, 235, 0.15);
                  }

                  .danger-btn {
                    min-height: 38px;
                    padding: 0 14px;
                    color: #b91c1c;
                    background: rgba(239, 68, 68, 0.08);
                    border: 1px solid rgba(239, 68, 68, 0.16);
                    border-radius: 12px;
                  }

                  .tiny-btn {
                    min-height: 34px;
                    padding: 0 12px;
                    color: var(--primary);
                    background: rgba(37, 99, 235, 0.08);
                    border: 1px solid rgba(37, 99, 235, 0.15);
                    border-radius: 12px;
                    font-size: 12px;
                  }

                  .list-scroll,
                  .editor-scroll {
                    min-height: 0;
                    overflow-y: auto;
                  }

                  .post-list {
                    padding: 18px;
                    display: grid;
                    gap: 14px;
                  }

                  .post-card {
                    padding: 18px;
                    border-radius: 18px;
                    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(248,250,252,0.95));
                    border: 1px solid rgba(226, 232, 240, 0.95);
                    box-shadow: 0 10px 20px rgba(15, 23, 42, 0.04);
                  }

                  .post-head {
                    display: flex;
                    justify-content: space-between;
                    gap: 16px;
                    align-items: flex-start;
                    margin-bottom: 12px;
                  }

                  .post-title {
                    font-size: 18px;
                    font-weight: 800;
                    line-height: 1.5;
                    color: var(--text);
                  }

                  .post-meta {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 8px 12px;
                    color: var(--text-muted);
                    font-size: 12px;
                    margin-bottom: 12px;
                  }

                  .category-pill {
                    display: inline-flex;
                    align-items: center;
                    padding: 6px 10px;
                    border-radius: 999px;
                    font-size: 12px;
                    font-weight: 800;
                    background: rgba(37, 99, 235, 0.08);
                    color: var(--primary);
                    border: 1px solid rgba(37, 99, 235, 0.12);
                  }

                  .post-excerpt {
                    color: var(--text-soft);
                    font-size: 14px;
                    line-height: 1.85;
                    white-space: pre-wrap;
                    margin-bottom: 14px;
                  }

                  .post-actions {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                  }

                  .post-actions-left {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    color: var(--text-muted);
                    font-size: 12px;
                  }

                  .pagination {
                    padding: 14px 18px 18px;
                    border-top: 1px solid rgba(148, 163, 184, 0.16);
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                  }

                  .pagination-info {
                    color: var(--text-muted);
                    font-size: 13px;
                  }

                  .pagination-actions {
                    display: flex;
                    gap: 10px;
                  }

                  .pagination button {
                    min-height: 40px;
                    min-width: 96px;
                    padding: 0 14px;
                    border-radius: 12px;
                    border: 1px solid rgba(148, 163, 184, 0.22);
                    background: rgba(255, 255, 255, 0.82);
                    color: var(--text-soft);
                    cursor: pointer;
                    font-weight: 800;
                  }

                  .pagination button:disabled {
                    opacity: 0.45;
                    cursor: not-allowed;
                  }

                  .editor-card .panel-body {
                    padding: 0;
                  }

                  .editor-scroll {
                    padding: 18px;
                  }

                  .editor-note {
                    margin-bottom: 18px;
                    padding: 16px;
                    border-radius: 16px;
                    background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(6, 182, 212, 0.08));
                    border: 1px solid rgba(125, 211, 252, 0.28);
                  }

                  .editor-note strong {
                    display: block;
                    margin-bottom: 6px;
                    font-size: 15px;
                  }

                  .editor-note p {
                    color: var(--text-soft);
                    font-size: 13px;
                    line-height: 1.75;
                  }

                  .form-grid {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 14px;
                  }

                  .form-group {
                    margin-bottom: 14px;
                  }

                  .form-group label {
                    display: block;
                    margin-bottom: 8px;
                    color: var(--text-soft);
                    font-size: 13px;
                    font-weight: 700;
                  }

                  .form-field {
                    min-height: 46px;
                    border-radius: 14px;
                    border: 1px solid rgba(148, 163, 184, 0.22);
                    background: rgba(255, 255, 255, 0.9);
                    padding: 0 14px;
                    display: flex;
                    align-items: center;
                  }

                  .form-field.textarea {
                    min-height: 200px;
                    padding: 12px 14px;
                    align-items: stretch;
                  }

                  .form-field textarea {
                    resize: vertical;
                    min-height: 176px;
                    line-height: 1.85;
                  }

                  .message {
                    margin-bottom: 14px;
                    padding: 12px 14px;
                    border-radius: 14px;
                    font-size: 13px;
                    line-height: 1.7;
                  }

                  .message.success {
                    background: rgba(34, 197, 94, 0.1);
                    color: #15803d;
                    border: 1px solid rgba(34, 197, 94, 0.16);
                  }

                  .message.error {
                    background: rgba(239, 68, 68, 0.1);
                    color: #b91c1c;
                    border: 1px solid rgba(239, 68, 68, 0.16);
                  }

                  .empty-state,
                  .loading-state {
                    min-height: 220px;
                    display: grid;
                    place-items: center;
                    text-align: center;
                    padding: 28px;
                    color: var(--text-muted);
                    border-radius: 18px;
                    border: 1px dashed rgba(148, 163, 184, 0.25);
                    background: rgba(248, 250, 252, 0.72);
                  }

                  .empty-state strong,
                  .loading-state strong {
                    display: block;
                    color: var(--text);
                    font-size: 18px;
                    margin-bottom: 8px;
                  }

                  .status-layout .panel-card {
                    min-height: 0;
                  }

                  .status-detail {
                    min-height: 0;
                    display: grid;
                    grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
                    gap: 16px;
                  }

                  .status-list {
                    display: grid;
                    gap: 12px;
                  }

                  .status-item {
                    padding: 16px;
                    border-radius: 16px;
                    background: rgba(248, 250, 252, 0.88);
                    border: 1px solid rgba(226, 232, 240, 0.9);
                  }

                  .status-item-head {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                    margin-bottom: 8px;
                  }

                  .status-item strong {
                    font-size: 15px;
                  }

                  .status-item p {
                    color: var(--text-soft);
                    font-size: 13px;
                    line-height: 1.75;
                  }

                  .metrics-box {
                    padding: 18px;
                    border-radius: 18px;
                    background: linear-gradient(180deg, #0f172a, #111827);
                    color: #dbeafe;
                    min-height: 240px;
                    display: flex;
                    flex-direction: column;
                    gap: 12px;
                  }

                  .metrics-box strong {
                    font-size: 16px;
                  }

                  .metrics-box p {
                    color: #93c5fd;
                    font-size: 13px;
                    line-height: 1.8;
                  }

                  .metrics-list {
                    display: grid;
                    gap: 10px;
                    font-size: 13px;
                  }

