                  const statMetricsDesc = document.getElementById('statMetricsDesc');
                  const statMetricsBadge = document.getElementById('statMetricsBadge');

                  const statusApiValue = document.getElementById('statusApiValue');
                  const statusApiDesc = document.getElementById('statusApiDesc');
                  const statusApiBadge = document.getElementById('statusApiBadge');
                  const statusReadyValue = document.getElementById('statusReadyValue');
                  const statusReadyDesc = document.getElementById('statusReadyDesc');
                  const statusReadyBadge = document.getElementById('statusReadyBadge');
                  const statusMetricsValue = document.getElementById('statusMetricsValue');
                  const statusMetricsDesc = document.getElementById('statusMetricsDesc');
                  const statusMetricsBadge = document.getElementById('statusMetricsBadge');

                  const detailApiBadge = document.getElementById('detailApiBadge');
                  const detailApiText = document.getElementById('detailApiText');
                  const detailReadyBadge = document.getElementById('detailReadyBadge');
                  const detailReadyText = document.getElementById('detailReadyText');
                  const detailPostText = document.getElementById('detailPostText');
                  const metricsStatusLine = document.getElementById('metricsStatusLine');
                  const metricsIntroText = document.getElementById('metricsIntroText');

                  const postsContainer = document.getElementById('postsContainer');
                  const pagination = document.getElementById('pagination');
                  const homeRecentContainer = document.getElementById('homeRecentContainer');
                  const listModeBadge = document.getElementById('listModeBadge');

                  const postForm = document.getElementById('postForm');
                  const messageDiv = document.getElementById('message');
                  const categorySelect = document.getElementById('categorySelect');
                  const otherCategoryGroup = document.getElementById('otherCategoryGroup');

                  const searchInput = document.getElementById('searchInput');
                  const categoryFilter = document.getElementById('categoryFilter');
                  const confirmModal = document.getElementById('confirmModal');
                  const confirmText = document.getElementById('confirmText');
                  const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
                  const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');

                  function escapeHtml(text) {
                    const div = document.createElement('div');
                    div.textContent = text == null ? '' : String(text);
                    return div.innerHTML;
                  }

                  function formatDateCN(value) {
                    const date = new Date(value);
                    if (Number.isNaN(date.getTime())) return '时间未知';
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const d = String(date.getDate()).padStart(2, '0');
                    const h = String(date.getHours()).padStart(2, '0');
                    const min = String(date.getMinutes()).padStart(2, '0');
                    return `${y}年${m}月${d}日 ${h}:${min}`;
                  }

                  function formatClock() {
                    const now = new Date();
                    clockText.textContent = formatDateCN(now);
                  }

                  function getBadgeClassByState(ok, fallback = 'warning') {
                    if (ok === true) return 'success';
                    if (ok === false) return 'danger';
                    return fallback;
                  }

                  function setBadge(el, text, cls) {
                    if (!el) return;
                    el.className = `badge ${cls}`;
                    el.textContent = text;
                  }

                  function updateTopHealth(apiOk, readyOk) {
                    if (apiOk && readyOk) {
                      topHealthText.textContent = '系统运行正常';
                    } else if (apiOk || readyOk) {
                      topHealthText.textContent = '部分组件可用';
                    } else {
                      topHealthText.textContent = '系统状态待确认';
                    }
                  }

                  function normalizeBooleanFromData(data) {
                    if (typeof data === 'boolean') return data;
                    if (typeof data === 'string') {
                      const lower = data.toLowerCase();
                      if (lower.includes('ok') || lower.includes('ready') || lower.includes('healthy') || lower.includes('up') || lower.includes('success')) return true;
                      if (lower.includes('fail') || lower.includes('error') || lower.includes('down') || lower.includes('not ready')) return false;
                    }
                    if (data && typeof data === 'object') {
                      const candidates = [data.ok, data.ready, data.healthy, data.status, data.message];
                      for (const item of candidates) {
                        const normalized = normalizeBooleanFromData(item);
                        if (typeof normalized === 'boolean') return normalized;
                      }
                    }
                    return null;
                  }

                  async function safeFetchJson(url) {
                    const response = await fetch(url);
                    const text = await response.text();
                    let data;
                    try {
                      data = text ? JSON.parse(text) : null;
                    } catch (error) {
                      data = text;
                    }
                    return { ok: response.ok, status: response.status, data, rawText: text };
                  }

                  async function loadHealthStatus() {
                    let apiState = null;
                    let readyState = null;
                    let metricsOk = null;

                    try {
                      const healthRes = await safeFetchJson(`${API_URL}/health`);
                      apiState = healthRes.ok ? normalizeBooleanFromData(healthRes.data) : false;
                      if (apiState === null) apiState = healthRes.ok;

                      statApiValue.textContent = apiState ? '正常' : '异常';
                      statApiDesc.textContent = `健康检查返回 HTTP ${healthRes.status}。`;
                      setBadge(statApiBadge, apiState ? '健康' : '异常', getBadgeClassByState(apiState));

                      statusApiValue.textContent = apiState ? '正常' : '异常';
                      statusApiDesc.textContent = `接口健康检查已完成，HTTP 状态码 ${healthRes.status}。`;
                      setBadge(statusApiBadge, apiState ? '健康' : '异常', getBadgeClassByState(apiState));
                      setBadge(detailApiBadge, apiState ? '健康' : '异常', getBadgeClassByState(apiState));
                      detailApiText.textContent = apiState
                        ? `博客 API 健康检查通过，说明服务链路当前可用。`
                        : `博客 API 健康检查未通过，请检查后端服务或接口代理配置。`;
                    } catch (error) {
                      apiState = false;
                      statApiValue.textContent = '异常';
                      statApiDesc.textContent = '无法访问 `/api/health`。';
                      setBadge(statApiBadge, '异常', 'danger');

                      statusApiValue.textContent = '异常';
                      statusApiDesc.textContent = '无法访问 `/api/health`。';
                      setBadge(statusApiBadge, '异常', 'danger');
                      setBadge(detailApiBadge, '异常', 'danger');
                      detailApiText.textContent = '无法访问健康检查接口，请检查后端服务或代理配置。';
                    }

                    try {
                      const readyRes = await safeFetchJson(`${API_URL}/ready`);
                      readyState = readyRes.ok ? normalizeBooleanFromData(readyRes.data) : false;
                      if (readyState === null) readyState = readyRes.ok;

                      statReadyValue.textContent = readyState ? '已就绪' : '未就绪';
                      statReadyDesc.textContent = `就绪检查返回 HTTP ${readyRes.status}。`;
                      setBadge(statReadyBadge, readyState ? '就绪' : '未就绪', getBadgeClassByState(readyState));

                      statusReadyValue.textContent = readyState ? '已就绪' : '未就绪';
                      statusReadyDesc.textContent = `数据库或依赖组件 readiness 检查已完成。`;
                      setBadge(statusReadyBadge, readyState ? '就绪' : '未就绪', getBadgeClassByState(readyState));
                      setBadge(detailReadyBadge, readyState ? '就绪' : '未就绪', getBadgeClassByState(readyState));
                      detailReadyText.textContent = readyState
                        ? '数据库依赖就绪，系统具备正常读写能力。'
                        : '数据库或依赖尚未就绪，请检查后端启动与依赖连接情况。';
                    } catch (error) {
                      readyState = false;
                      statReadyValue.textContent = '异常';
                      statReadyDesc.textContent = '无法访问 `/api/ready`。';
                      setBadge(statReadyBadge, '异常', 'danger');

                      statusReadyValue.textContent = '异常';
                      statusReadyDesc.textContent = '无法访问 `/api/ready`。';
                      setBadge(statusReadyBadge, '异常', 'danger');
                      setBadge(detailReadyBadge, '异常', 'danger');
                      detailReadyText.textContent = '无法访问就绪检查接口，请确认数据库依赖或 readiness 路由。';
                    }

                    try {
                      const metricsRes = await fetch(`${API_URL}/metrics`);
                      metricsOk = metricsRes.ok;

                      statMetricsValue.textContent = metricsOk ? '已暴露' : '未暴露';
                      statMetricsDesc.textContent = metricsOk ? 'Prometheus 指标入口可访问。' : `指标入口返回 HTTP ${metricsRes.status}。`;
                      setBadge(statMetricsBadge, metricsOk ? '可用' : '异常', getBadgeClassByState(metricsOk));

                      statusMetricsValue.textContent = metricsOk ? '已暴露' : '未暴露';
                      statusMetricsDesc.textContent = metricsOk ? '监控指标入口可访问，便于对接 Prometheus。' : `指标入口不可用或未开放。`;
                      setBadge(statusMetricsBadge, metricsOk ? '可用' : '异常', getBadgeClassByState(metricsOk));

                      metricsStatusLine.textContent = metricsOk
                        ? '指标入口状态：已检测到 `/api/metrics`，可用于监控抓取。'
                        : '指标入口状态：未成功访问 `/api/metrics`，可作为后续增强点。';
                      metricsIntroText.textContent = metricsOk
                        ? '当前系统已具备指标暴露入口，可以进一步接入 Prometheus / Grafana 形成完整可观测性方案。'
                        : '当前未成功检测到指标入口，但页面已预留监控展示位，适合后续扩展可观测性能力。';
                    } catch (error) {
                      metricsOk = false;
                      statMetricsValue.textContent = '异常';
                      statMetricsDesc.textContent = '无法访问 `/api/metrics`。';
                      setBadge(statMetricsBadge, '异常', 'danger');

                      statusMetricsValue.textContent = '异常';
                      statusMetricsDesc.textContent = '无法访问 `/api/metrics`。';
                      setBadge(statusMetricsBadge, '异常', 'danger');

                      metricsStatusLine.textContent = '指标入口状态：无法访问 `/api/metrics`。';
                      metricsIntroText.textContent = '当前未检测到指标入口，请确认后端是否已暴露 metrics 接口。';
                    }

                    updateTopHealth(apiState, readyState);
                    heroModeText.textContent =
                      apiState && readyState
                        ? '平台运行稳定，适合展示云原生博客能力'
                        : '平台部分组件待确认，建议检查后端状态';
                  }

                  function summarizeContent(content, length = 120) {
                    const text = String(content || '').replace(/\s+/g, ' ').trim();
                    if (text.length <= length) {
                      return {
                        short: text || '暂无内容摘要。',
                        full: text || '暂无内容摘要。',
                        expandable: false
                      };
                    }
                    return {
                      short: `${text.slice(0, length)}...`,
                      full: text,
                      expandable: true
                    };
                  }

                  function renderHomeRecent(posts) {
                    if (!Array.isArray(posts) || posts.length === 0) {
                      homeRecentContainer.innerHTML = `
                        <div class="empty-state">
                          <div>
                            <strong>暂无文章内容</strong>
                            <div>当前还没有可展示的文章，请先到“文章管理”中发布内容。</div>
                          </div>
                        </div>
                      `;
                      return;
                    }

                    homeRecentContainer.innerHTML = `
                      <div class="quick-list">
                        ${posts.slice(0, 5).map(post => {
                          const summary = summarizeContent(post.content, 90);
                          return `
                            <article class="quick-post">
                              <h4>${escapeHtml(post.title || '未命名文章')}</h4>
                              <div class="meta">
                                <span>${escapeHtml(post.author || '未知作者')}</span>
                                <span>${formatDateCN(post.created_at)}</span>
                                <span>${escapeHtml(post.category || '未分类')}</span>
                              </div>
                              <div class="excerpt">${escapeHtml(summary.short)}</div>
                            </article>
                          `;
                        }).join('')}
                      </div>
                    `;
                  }

                  function renderEmptyPosts(title, desc) {
                    postsContainer.innerHTML = `
                      <div class="empty-state">
                        <div>
                          <strong>${escapeHtml(title)}</strong>
                          <div>${escapeHtml(desc)}</div>
                        </div>
                      </div>
                    `;
                  }

                  function renderLoadingPosts(text) {
                    postsContainer.innerHTML = `
                      <div class="loading-state">
                        <div>
                          <strong>${escapeHtml(text)}</strong>
                          <div>请稍候，系统正在同步文章列表。</div>
                        </div>
                      </div>
                    `;
                  }

                  function renderMessage(type, text) {
                    messageDiv.innerHTML = `<div class="message ${type}">${escapeHtml(text)}</div>`;
                  }

                  function clearMessage() {
                    messageDiv.innerHTML = '';
                  }

                  function updateListMode() {
                    const parts = [];
                    if (currentSearchKeyword) parts.push(`搜索：${currentSearchKeyword}`);
                    if (currentCategoryFilter) parts.push(`分类：${currentCategoryFilter}`);
                    listModeBadge.textContent = parts.length ? parts.join(' / ') : '全部文章';
                  }

                  function renderPosts(posts) {
                    currentList = Array.isArray(posts) ? posts : [];
                    updateListMode();

                    if (!currentList.length) {
                      if (currentSearchKeyword || currentCategoryFilter) {
                        renderEmptyPosts('没有找到匹配文章', '请尝试更换关键词、切换分类，或点击“重置条件”查看全部内容。');
                      } else {
                        renderEmptyPosts('当前还没有文章', '请在右侧发布面板中创建第一篇文章。');
                      }
                      return;
                    }

                    postsContainer.innerHTML = currentList.map(post => {
                      const summary = summarizeContent(post.content, 120);
                      const safeTitle = escapeHtml(post.title || '未命名文章');
                      const safeAuthor = escapeHtml(post.author || '未知作者');
                      const safeCategory = escapeHtml(post.category || '未分类');
                      const createdAt = formatDateCN(post.created_at);
                      return `
                        <article class="post-card" data-id="${escapeHtml(post.id)}">
                          <div class="post-head">
                            <div>
                              <div class="post-title">${safeTitle}</div>
                            </div>
                            <div class="category-pill">${safeCategory}</div>
                          </div>

                          <div class="post-meta">
                            <span>作者：${safeAuthor}</span>
                            <span>发布时间：${createdAt}</span>
                            <span>文章 ID：${escapeHtml(post.id)}</span>
                          </div>

                          <div class="post-excerpt" id="content-${escapeHtml(post.id)}">${escapeHtml(summary.short)}</div>

                          <div class="post-actions">
                            <div class="post-actions-left">
                              <span>${summary.expandable ? '已自动折叠为摘要展示' : '内容较短，已完整展示'}</span>
                            </div>
                            <div style="display:flex; gap:10px;">
                              ${summary.expandable ? `<button class="tiny-btn toggle-content-btn" data-id="${escapeHtml(post.id)}" data-short="${escapeHtml(summary.short)}" data-full="${escapeHtml(summary.full)}" data-expanded="false">查看全文</button>` : ''}
                              <button class="danger-btn delete-btn" data-id="${escapeHtml(post.id)}" data-title="${safeTitle}">删除文章</button>
                            </div>
                          </div>
                        </article>
                      `;
                    }).join('');
                  }

                  function renderPagination() {
                    const inSearchMode = !!currentSearchKeyword || !!currentCategoryFilter;
                    if (inSearchMode) {
                      pagination.innerHTML = `
                        <div class="pagination-info">当前处于筛选结果模式，共 ${currentList.length} 篇文章。</div>
                        <div class="pagination-actions">
                          <button id="resetFromPagination">返回全部文章</button>
                        </div>
                      `;
                      document.getElementById('resetFromPagination')?.addEventListener('click', resetFilters);
                      return;
                    }

                    pagination.innerHTML = `
                      <div class="pagination-info">第 ${currentPage} / ${totalPages} 页，共 ${totalPosts} 篇文章</div>
                      <div class="pagination-actions">
                        <button id="prevPageBtn" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                        <button id="nextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                      </div>
                    `;

                    document.getElementById('prevPageBtn')?.addEventListener('click', () => {
                      if (currentPage > 1) loadPosts(currentPage - 1);
                    });

                    document.getElementById('nextPageBtn')?.addEventListener('click', () => {
                      if (currentPage < totalPages) loadPosts(currentPage + 1);
                    });
                  }

                  function extractTotal(result) {
                    if (!result || typeof result !== 'object') return null;
                    const candidates = [result.total, result.totalCount, result.count, result.total_posts];
                    for (const item of candidates) {
                      const num = Number(item);
                      if (Number.isFinite(num) && num >= 0) return num;
                    }
                    return null;
                  }

                  async function loadPosts(page = 1) {
                    currentPage = page;
                    renderLoadingPosts('正在加载文章列表');

                    try {
                      const response = await fetch(`${API_URL}/posts?page=${page}&limit=${PAGE_LIMIT}`);
                      const result = await response.json();

                      if (!result || !Array.isArray(result.data)) {
                        throw new Error('Invalid response format');
                      }

                      currentList = result.data;
                      totalPages = Math.max(1, Number(result.totalPages) || 1);

                      const extractedTotal = extractTotal(result);
                      totalPosts = extractedTotal != null ? extractedTotal : ((totalPages - 1) * PAGE_LIMIT + result.data.length);

                      statTotalPosts.textContent = String(totalPosts);
                      detailPostText.textContent = `当前系统共统计到 ${totalPosts} 篇文章，分页上限为每页 ${PAGE_LIMIT} 篇。`;

                      renderPosts(result.data);
                      renderPagination();
                      renderHomeRecent(result.data);
                    } catch (error) {
                      postsContainer.innerHTML = `
                        <div class="empty-state">
                          <div>
                            <strong>文章列表加载失败</strong>
                            <div>无法获取文章数据，请检查博客 API 是否正常工作。</div>
                          </div>
                        </div>
                      `;
                      homeRecentContainer.innerHTML = `
                        <div class="empty-state">
                          <div>
                            <strong>首页概览加载失败</strong>
                            <div>无法同步文章摘要数据。</div>
                          </div>
                        </div>
                      `;
                      pagination.innerHTML = '';
                    }
                  }

                  async function searchPosts(keyword) {
                    renderLoadingPosts('正在搜索文章');

                    try {
                      const response = await fetch(`${API_URL}/posts/search?q=${encodeURIComponent(keyword)}`);
                      const posts = await response.json();

                      if (!Array.isArray(posts)) {
                        throw new Error('Invalid search response');
                      }

                      let filtered = posts;
                      if (currentCategoryFilter) {
                        filtered = posts.filter(post => String(post.category || '') === currentCategoryFilter);
                      }

                      totalPages = 1;
                      currentPage = 1;
                      currentList = filtered;
                      renderPosts(filtered);
                      renderPagination();
                    } catch (error) {
                      postsContainer.innerHTML = `
                        <div class="empty-state">
                          <div>
                            <strong>搜索失败</strong>
                            <div>无法完成搜索请求，请稍后重试。</div>
                          </div>
                        </div>
                      `;
                      pagination.innerHTML = '';
                    }
                  }

                  async function loadAllForCategoryFilter() {
                    renderLoadingPosts('正在按分类筛选');

                    try {
                      const response = await fetch(`${API_URL}/posts?page=1&limit=1000`);
                      const result = await response.json();

                      if (!result || !Array.isArray(result.data)) {
                        throw new Error('Invalid response format');
                      }

                      const filtered = currentCategoryFilter
                        ? result.data.filter(post => String(post.category || '') === currentCategoryFilter)
                        : result.data;

                      currentList = filtered;
                      totalPages = 1;
                      currentPage = 1;
                      renderPosts(filtered);
                      renderPagination();
                    } catch (error) {
                      postsContainer.innerHTML = `
                        <div class="empty-state">
                          <div>
                            <strong>分类筛选失败</strong>
                            <div>无法按分类加载文章，请稍后重试。</div>
                          </div>
                        </div>
                      `;
                      pagination.innerHTML = '';
                    }
                  }

                  async function runSearchOrFilter() {
                    if (currentSearchKeyword) {
                      await searchPosts(currentSearchKeyword);
                      return;
                    }
                    if (currentCategoryFilter) {
                      await loadAllForCategoryFilter();
                      return;
                    }
                    await loadPosts(1);
                  }

                  function resetFilters() {
                    searchInput.value = '';
                    categoryFilter.value = '';
                    currentSearchKeyword = '';
                    currentCategoryFilter = '';
                    loadPosts(1);
                  }

                  function openDeleteModal(postId, title) {
                    deleteTargetId = postId;
                    confirmText.textContent = `确定要删除《${title}》吗？此操作不可恢复。`;
                    confirmModal.classList.add('show');
                  }

                  function closeDeleteModal() {
                    deleteTargetId = null;
                    confirmModal.classList.remove('show');
                  }

                  async function deletePost(postId) {
                    const response = await fetch(`${API_URL}/posts/${postId}`, {
                      method: 'DELETE'
                    });
                    if (!response.ok) {
                      throw new Error('Delete failed');
                    }
                  }

                  function switchTab(tabName) {
                    navTabs.forEach(tab => {
                      tab.classList.toggle('active', tab.dataset.tab === tabName);
                    });

                    tabPanels.forEach(panel => {
                      panel.classList.toggle('active', panel.id === `tab-${tabName}`);
                    });
                  }

                  navTabs.forEach(tab => {
                    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
                  });

                  jumpTabButtons.forEach(button => {
                    button.addEventListener('click', () => switchTab(button.dataset.jumpTab));
                  });

                  categorySelect.addEventListener('change', function() {
                    otherCategoryGroup.style.display = this.value === '其他' ? 'block' : 'none';
                  });

                  postForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const title = document.getElementById('title').value.trim();
                    const author = document.getElementById('author').value.trim();
                    let category = categorySelect.value;
                    const content = document.getElementById('content').value.trim();

                    if (category === '其他') {
                      category = document.getElementById('otherCategory').value.trim() || '其他';
                    }

                    try {
                      const response = await fetch(`${API_URL}/posts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, author, category, content })
                      });

                      if (!response.ok) {
                        throw new Error('Create failed');
                      }

                      renderMessage('success', '文章发布成功，系统已为你刷新文章列表。');
                      postForm.reset();
                      categorySelect.value = '技术';
                      otherCategoryGroup.style.display = 'none';
                      setTimeout(clearMessage, 3000);

                      currentSearchKeyword = '';
                      currentCategoryFilter = '';
                      searchInput.value = '';
                      categoryFilter.value = '';
                      await loadPosts(1);
                      await loadHealthStatus();
                    } catch (error) {
                      renderMessage('error', '文章发布失败，请检查后端接口或稍后重试。');
                    }
                  });

                  document.getElementById('searchBtn').addEventListener('click', () => {
                    currentSearchKeyword = searchInput.value.trim();
                    currentCategoryFilter = categoryFilter.value;
                    runSearchOrFilter();
                  });

                  document.getElementById('resetBtn').addEventListener('click', resetFilters);

                  searchInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter') {
                      currentSearchKeyword = searchInput.value.trim();
                      currentCategoryFilter = categoryFilter.value;
                      runSearchOrFilter();
                    }
                  });

                  categoryFilter.addEventListener('change', () => {
                    currentCategoryFilter = categoryFilter.value;
                    currentSearchKeyword = searchInput.value.trim();
                    runSearchOrFilter();
                  });

                  postsContainer.addEventListener('click', async e => {
                    const toggleBtn = e.target.closest('.toggle-content-btn');
                    const deleteBtn = e.target.closest('.delete-btn');

                    if (toggleBtn) {
                      const postId = toggleBtn.dataset.id;
                      const contentEl = document.getElementById(`content-${postId}`);
                      const expanded = toggleBtn.dataset.expanded === 'true';

                      if (!contentEl) return;

                      if (expanded) {
                        contentEl.textContent = toggleBtn.dataset.short;
                        toggleBtn.dataset.expanded = 'false';
                        toggleBtn.textContent = '查看全文';
                      } else {
                        contentEl.textContent = toggleBtn.dataset.full;
                        toggleBtn.dataset.expanded = 'true';
                        toggleBtn.textContent = '收起内容';
                      }
                      return;
                    }

                    if (deleteBtn) {
                      openDeleteModal(deleteBtn.dataset.id, deleteBtn.dataset.title || '该文章');
                    }
                  });

                  confirmDeleteBtn.addEventListener('click', async () => {
                    if (!deleteTargetId) return;
                    try {
                      await deletePost(deleteTargetId);
                      closeDeleteModal();
                      if (currentSearchKeyword || currentCategoryFilter) {
                        await runSearchOrFilter();
                      } else {
                        await loadPosts(currentPage);
                      }
                      await loadHealthStatus();
                    } catch (error) {
                      closeDeleteModal();
                      alert('删除失败，请检查后端接口或稍后重试。');
                    }
                  });

                  cancelDeleteBtn.addEventListener('click', closeDeleteModal);
                  confirmModal.addEventListener('click', e => {
                    if (e.target === confirmModal) closeDeleteModal();
                  });

                  document.getElementById('refreshStatusBtn').addEventListener('click', async () => {
                    await loadHealthStatus();
                    await loadPosts(currentSearchKeyword || currentCategoryFilter ? 1 : currentPage);
                  });

                  async function initialize() {
                    formatClock();
                    setInterval(formatClock, 1000 * 30);
                    await Promise.all([loadPosts(1), loadHealthStatus()]);
                  }

                  initialize();
                </script>
              </body>
              </html>
              EOF

              cat > /etc/nginx/conf.d/default.conf << 'EOF'
              server {
                listen 80;
                server_name _;

                location / {
                  root /usr/share/nginx/html;
                  index index.html;
                  try_files $uri $uri/ /index.html;
                }

                location /api/ {
                  proxy_pass http://blog-api:3000/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
              }
              EOF

              nginx -g 'daemon off;'
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: blog-frontend
  namespace: blog-platform
  labels:
    app: blog
    tier: frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: blog
    tier: frontend
