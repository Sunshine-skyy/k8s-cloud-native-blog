                  const tabPanels = document.querySelectorAll('.tab-panel');
                  const jumpTabButtons = document.querySelectorAll('[data-jump-tab]');

                  const topHealthText = document.getElementById('topHealthText');
                  const clockText = document.getElementById('clockText');
                  const heroModeText = document.getElementById('heroModeText');

                  const statTotalPosts = document.getElementById('statTotalPosts');
                  const statApiValue = document.getElementById('statApiValue');
                  const statApiDesc = document.getElementById('statApiDesc');
                  const statApiBadge = document.getElementById('statApiBadge');
